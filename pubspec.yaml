name: lessonvault
description: A mobile-based learning material repository for the college classroom.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # File handling
  file_picker: ^6.1.1
  path_provider: ^2.1.2
  open_filex: ^4.3.4
  dio: ^5.4.0

  # UI & utilities
  provider: ^6.1.1
  intl: ^0.19.0
  uuid: ^4.3.3
  cached_network_image: ^3.3.1
  flutter_local_notifications: ^16.3.0
  lottie: ^3.0.0
  google_fonts: ^6.1.0
  iconsax: ^0.0.8
  supabase_flutter: ^2.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
